name: Update PKGBUILD checksums

on:
  push:
    branches:
      - 'renovate/**'
    paths:
      - '*/PKGBUILD'

jobs:
  update-checksums:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'update checksums')"
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets._GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find changed PKGBUILDs
        id: changed
        run: |
          PACKAGES=$(git diff --name-only origin/master...HEAD -- '*/PKGBUILD' | xargs -r -I{} dirname {})
          echo "packages<<EOF" >> $GITHUB_OUTPUT
          echo "$PACKAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update checksums and .SRCINFO
        if: steps.changed.outputs.packages != ''
        run: |
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "::group::Updating $pkg"

            # Reset pkgrel to 1
            sed -i -E "s/^(pkgrel=)(['\"]?)[0-9]+\2$/\1\21\2/" "$pkg/PKGBUILD"

            # Update checksums and regenerate .SRCINFO using Arch Linux container
            docker run --rm \
              -v "$PWD/$pkg:/pkg" \
              archlinux:latest \
              bash -c '
                set -e
                pacman -Sy --noconfirm pacman-contrib
                useradd -m builder
                chown -R builder:builder /pkg
                cd /pkg
                runuser -u builder -- env SRCDEST=/tmp/sources updpkgsums
                runuser -u builder -- bash -c "makepkg --printsrcinfo > .SRCINFO"
              '

            # Restore file ownership
            sudo chown -R "$(id -u):$(id -g)" "$pkg"

            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.packages }}"

      - name: Commit and push
        if: steps.changed.outputs.packages != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: update checksums and .SRCINFO"
            git push
          fi
